<div class="max-w-5xl mx-auto px-4 py-8">

    <!-- ── Top Action Bar ──────────────────────────────────────────── -->
    <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 mb-6">

        <!-- Create Ticket Button -->
        <button id="create-ticket-btn" (click)="toggleCreate()"
            class="inline-flex items-center gap-2 rounded-md px-4 py-2 text-sm font-medium text-white transition-colors shadow-sm"
            [ngClass]="isCreating
        ? 'bg-red-500 hover:bg-red-600'
        : 'bg-indigo-600 hover:bg-indigo-700 dark:bg-indigo-500 dark:hover:bg-indigo-600'">
            <svg *ngIf="!isCreating" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
            </svg>
            <svg *ngIf="isCreating" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
            {{ isCreating ? 'Cancel' : 'Create New Ticket' }}
        </button>

        <!-- Search Bar -->
        <div class="flex items-center gap-2">
            <input type="text" [ngModel]="searchQuery" (input)="onSearchChange($any($event.target).value)"
                placeholder="Search by name or desc..."
                class="h-9 rounded-md border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 px-3 text-sm text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 w-56 transition-colors">
            <button (click)="search()"
                class="h-9 px-4 rounded-md bg-emerald-600 hover:bg-emerald-700 text-sm font-medium text-white transition-colors shadow-sm">
                Search
            </button>
        </div>
    </div>

    <!-- ── Create Ticket Form ───────────────────────────────────────── -->
    <div *ngIf="isCreating"
        class="mb-6 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 p-5 shadow-sm transition-colors">
        <h3 class="text-base font-semibold text-slate-900 dark:text-white mb-4">Create Ticket</h3>
        <div class="grid gap-3">
            <input type="text" [(ngModel)]="newTicket.name" placeholder="Ticket Name"
                class="w-full rounded-md border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-3 py-2 text-sm text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-colors">
            <textarea [(ngModel)]="newTicket.description" placeholder="Description" rows="3"
                class="w-full rounded-md border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-3 py-2 text-sm text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none transition-colors"></textarea>
            <select [(ngModel)]="newTicket.status"
                class="w-full rounded-md border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-3 py-2 text-sm text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-colors">
                <option value="NEW">New</option>
                <option value="ASSIGNED">Assigned</option>
                <option value="DONE">Done</option>
                <option value="ESCALATE">Escalate</option>
            </select>
            <div>
                <button (click)="createTicket()"
                    class="px-5 py-2 rounded-md bg-emerald-600 hover:bg-emerald-700 text-sm font-medium text-white transition-colors shadow-sm">
                    Save Ticket
                </button>
            </div>
        </div>
    </div>

    <!-- ── Edit Ticket Form ─────────────────────────────────────────── -->
    <div *ngIf="editingTicket"
        class="mb-6 rounded-lg border border-amber-300 dark:border-amber-600 bg-amber-50 dark:bg-amber-950/30 p-5 shadow-sm transition-colors">
        <div class="flex items-center justify-between mb-4">
            <h3 class="text-base font-semibold text-slate-900 dark:text-white">Edit Ticket</h3>
            <button (click)="cancelEdit()"
                class="px-3 py-1 rounded-md bg-red-500 hover:bg-red-600 text-xs font-medium text-white transition-colors">
                Cancel
            </button>
        </div>
        <div class="grid gap-3">
            <input type="text" [(ngModel)]="editingTicket.name" placeholder="Ticket Name"
                class="w-full rounded-md border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-3 py-2 text-sm text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-colors">
            <textarea [(ngModel)]="editingTicket.description" placeholder="Description" rows="3"
                class="w-full rounded-md border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-3 py-2 text-sm text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none transition-colors"></textarea>
            <select [(ngModel)]="editingTicket.status"
                class="w-full rounded-md border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-3 py-2 text-sm text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-colors">
                <option value="NEW">New</option>
                <option value="ASSIGNED">Assigned</option>
                <option value="DONE">Done</option>
                <option value="ESCALATE">Escalate</option>
            </select>
            <div>
                <button (click)="saveEdit()"
                    class="px-5 py-2 rounded-md bg-emerald-600 hover:bg-emerald-700 text-sm font-medium text-white transition-colors shadow-sm">
                    Update Ticket
                </button>
            </div>
        </div>
    </div>

    <!-- ── Tickets Table ────────────────────────────────────────────── -->
    <div class="w-full rounded-lg border border-slate-200 dark:border-slate-700 overflow-hidden shadow-sm">
        <table class="w-full text-sm text-left">
            <thead
                class="bg-slate-50 dark:bg-slate-800 text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">
                <tr>
                    <th class="px-4 py-3 border-b border-slate-200 dark:border-slate-700">ID</th>
                    <th class="px-4 py-3 border-b border-slate-200 dark:border-slate-700">Name</th>
                    <th class="px-4 py-3 border-b border-slate-200 dark:border-slate-700">Description</th>
                    <th class="px-4 py-3 border-b border-slate-200 dark:border-slate-700">Status</th>
                    <th class="px-4 py-3 border-b border-slate-200 dark:border-slate-700">Action</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-100 dark:divide-slate-700 bg-white dark:bg-slate-900">
                <tr *ngFor="let t of tickets" class="hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
                    <td class="px-4 py-3 text-slate-500 dark:text-slate-400 font-mono text-xs">{{ t.id }}</td>
                    <td class="px-4 py-3 font-medium text-slate-900 dark:text-white">{{ t.name }}</td>
                    <td class="px-4 py-3 text-slate-600 dark:text-slate-300 max-w-xs truncate">{{ t.description }}</td>
                    <td class="px-4 py-3">
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium" [ngClass]="{
                'bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-300': t.status === 'NEW',
                'bg-yellow-100 text-yellow-700 dark:bg-yellow-900/40 dark:text-yellow-300': t.status === 'ASSIGNED',
                'bg-green-100 text-green-700 dark:bg-green-900/40 dark:text-green-300': t.status === 'DONE',
                'bg-red-100 text-red-700 dark:bg-red-900/40 dark:text-red-300': t.status === 'ESCALATE'
              }">
                            {{ t.status }}
                        </span>
                    </td>
                    <td class="px-4 py-3">
                        <button (click)="editTicket(t)"
                            class="px-3 py-1 rounded-md bg-amber-400 hover:bg-amber-500 text-xs font-medium text-slate-900 transition-colors">
                            Edit
                        </button>
                    </td>
                </tr>
                <tr *ngIf="tickets.length === 0">
                    <td colspan="5" class="px-4 py-10 text-center text-sm text-slate-400 dark:text-slate-500">
                        No tickets found.
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- ── Pagination ───────────────────────────────────────────────── -->
    <div class="mt-5 flex items-center justify-center gap-3">
        <button [disabled]="currentPage === 0" (click)="goToPage(currentPage - 1)"
            class="inline-flex items-center gap-1 rounded-md border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 px-4 py-2 text-sm font-medium text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
            </svg>
            Previous
        </button>

        <span class="text-sm text-slate-600 dark:text-slate-400 font-medium">
            Page {{ currentPage + 1 }} of {{ totalPages || 1 }}
        </span>

        <button [disabled]="currentPage + 1 >= totalPages" (click)="goToPage(currentPage + 1)"
            class="inline-flex items-center gap-1 rounded-md border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 px-4 py-2 text-sm font-medium text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
            Next
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
            </svg>
        </button>
    </div>

</div>
